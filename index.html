<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Know Your Car | AI Expert</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar-glassy">
            <h1 class="know-your-car-title">Know Your Car</h1>
            <button class="new-chat-btn" onclick="startNewChat()">New Search +</button>
            <div id="recent-chats" class="recent-chats-list">
                </div>
        </aside>

        <main class="main-panel-glassy">
            <header class="main-header">
                <h2 id="chat-header-title">Welcome</h2>
                <span class="user-id-icon">A</span>
            </header>

            <div class="greeting-container" id="welcome-screen">
                <div class="car-loader"></div>
                <div class="car-shadow"></div>

                <h3 class="big-greeting">Discover.</h3>
                
                <div class="suggestion-cards">
                    <button class="suggestion-card" onclick="setInput('Find classic specs for 1969 Mustang')">
                        <span class="card-icon">🚗</span>
                        <span class="card-title">Classic Car Specs</span>
                        <span class="card-sub">Find 1969 Mustang history</span>
                    </button>
                    <button class="suggestion-card" onclick="setInput('Compare 2024 Tesla Model S and Porsche Taycan')">
                        <span class="card-icon">⚡</span>
                        <span class="card-title">Compare EV Models</span>
                        <span class="card-sub">Tesla Model S vs. Porsche Taycan</span>
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chat-history">
                </div>

            <div class="input-area-glassy">
                <input type="text" id="user-input" placeholder="e.g., compare the M5 and E63s..." onkeypress="handleEnter(event)">
                <button class="send-btn-icon" onclick="sendMessage()" aria-label="Send message" title="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
